version: "3.8"

services:
  # Metadata Database
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-pg
    environment:
      POSTGRES_USER: sentinel_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: sentinel_metadata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinel-net

  # Event Stream (Redis Pub/Sub)
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentinel-net

  # Cloud Object Store Mock
  minio:
    image: minio/minio
    container_name: sentinel-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: secure_minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
